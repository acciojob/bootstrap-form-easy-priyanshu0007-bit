<html>

<head>

<body>

<div class="container mt-4">
    <form class="needs-validation" novalidate>

        <h1>Internship Form</h1>

        <div class="mb-3">
            <label for="first-name-input" class="form-label">First Name</label>
            <input type="text" id="first-name-input" class="form-control" required>
            <div class="invalid-feedback">First name Required!</div>
        </div>

        <div class="mb-3">
            <label for="last-name-input" class="form-label">Last Name</label>
            <input type="text" id="last-name-input" class="form-control" required>
            <div class="invalid-feedback">Last name Required!</div>
        </div>

        <div class="mb-3">
            <label for="email-input" class="form-label">Email Address</label>
            <input type="email" id="email-input" class="form-control" placeholder="xyz@gmail.com" required>
            <div class="invalid-feedback">Email Required!</div>
        </div>

        <div class="mb-3">
            <label for="college-input" class="form-label">College Name</label>
            <input type="text" id="college-input" class="form-control" required>
            <div class="invalid-feedback">College name Required!</div>
        </div>

        <div class="mb-3">
            <label for="grad-year-select" class="form-label">Graduation Year</label>
            <select id="grad-year-select" class="form-select" required>
                <option value="">Choose...</option>
                <option>2020</option>
                <option>2021</option>
                <option>2022</option>
                <option>2023</option>
            </select>
            <div class="invalid-feedback">Graduation year Required!</div>
        </div>

        <div class="mb-3">
            <label for="roll-no-input" class="form-label">Roll No.</label>
            <input type="text" id="roll-no-input" class="form-control" required>
            <div class="invalid-feedback">Roll number Required!</div>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="conditions-checkbox" required>
            <label class="form-check-label" for="conditions-checkbox">
                Agree to terms and conditions
            </label>
            <div class="invalid-feedback">
                You must agree before submitting.
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Submit Form</button>

    </form>
</div>

<script src="./script.js"></script>

</body>
