<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form>
		<h1>Internship Form</h1>
		<input type="text" id="first-name-input" class="form-control" required>
        <div class="invalid-feedback">First name required!</div>

        <input type="text" id="last-name-input" class="form-control" required>
        <div class="invalid-feedback">Last name required!</div>

        <input type="email" id="email-input" class="form-control" required>
        <div class="invalid-feedback">Email required!</div>

        <input type="text" id="college-input" class="form-control" required>
        <div class="invalid-feedback">Please provide a valid college.</div>

        <select id="graduation-year-select" class="form-select" required>
          <option value="">Choose...</option>
          <option>2020</option>
          <option>2021</option>
          <option>2022</option>
          <option>2023</option>
       </select>
       <div class="invalid-feedback">Please select a valid Graduation Year.</div>

        <input type="number" id="roll-no-input" class="form-control" required>
<div class="invalid-feedback">Please provide a valid Roll no.</div>

<input type="checkbox" id="conditions-checkbox" required>
<label for="conditions-checkbox">Agree to terms and conditions</label>
<div class="invalid-feedback">
    You must agree before submitting.
</div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
