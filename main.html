<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form>
		<h1>Internship Form</h1>
		<label for="first-name-input" class="form-label">First Name</label>
		<input type="text" id="first-name-input" class="form-control" required>
		
		<label for="last-name-input" class="form-label">Last Name</label>
		<input type="text" id="last-name-input" required>
		
		<label for="email-input" class="form-label">Email Address</label>
		<input type="email" id="email-input" placeholder="xyz@gmail.com" required>
		
		<label for="college-input" class="form-label">College</label>
		<input type="text" id="college-input" required>
		
		<select id="grad-year-select">
			 <option value="">Choose...</option>
             <option>2020</option>
             <option>2021</option>
             <option>2022</option>
             <option>2023</option>
		</select>
		
		<label for="roll-no-input" class="form-label">Roll no</label>
		<input type="text" id="roll-no-input" required>
		
		<label for="conditions-checkbox" class="form-label">Agree to terms and condition</label>
		<input type="radio" id="conditions-checkbox" required>
		<button >Submit Form</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
